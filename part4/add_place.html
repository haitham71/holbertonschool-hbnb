<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Place - HBnB</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/add_place.css">
</head>
<body class="page-shell add-place-page light-mode">
    <div class="hero-bg">
        <div class="bg-slide active" style="background-image: url('BG-IMGS/Dubai.jpg');"></div>
    </div>
    <div class="page-overlay"></div>

    <header class="site-header">
        <img src="logo.png" alt="HBnB Logo" class="site-logo">

        <div class="theme-toggle">
            <button type="button" class="theme-btn active" id="light-mode-btn" aria-label="Light mode">
                <img src="icons/sun.png" alt="Light mode">
            </button>
            <button type="button" class="theme-btn" id="dark-mode-btn" aria-label="Dark mode">
                <img src="icons/moon.png" alt="Dark mode">
            </button>
        </div>
    </header>

    <nav class="top-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="login.html" class="nav-link" id="login-link">Login</a>
    </nav>

    <main class="add-place-main">
        <section class="add-place-layout">
            <div class="add-place-left">
                <div class="add-place-card">
                    <h1>Add New Place</h1>

                    <form id="add-place-form" class="add-place-form">
                        <label for="title">Place Title</label>
                        <input type="text" id="title" required>

                        <label for="short-description">Short Description</label>
                        <input type="text" id="short-description" required>

                        <div class="full-desc-price-row">
                            <div class="full-description-group">
                                <label for="description">Full Description</label>
                                <textarea id="description" rows="6"></textarea>
                            </div>

                            <div class="price-group">
                                <label for="price">Add Price</label>
                                <input type="number" id="price" min="1" required>
                            </div>
                        </div>

                        <div class="extra-fields-row">
                            <div>
                                <label for="guests">Max Guests</label>
                                <input type="number" id="guests" min="1" required>
                            </div>

                            <div>
                                <label for="city">City</label>
                                <input type="text" id="city" required>
                            </div>
                        </div>

                        <p id="add-place-message" class="add-place-message"></p>

                        <div class="add-place-submit-row">
                            <button type="submit" class="details-button">Add Place</button>
                        </div>
                    </form>
                </div>

                <div class="preview-gallery-card">
                    <div id="preview-gallery" class="preview-gallery"></div>
                </div>
            </div>

            <aside class="add-place-right">
                <div class="image-links-card">
                    <div class="image-link-group">
                        <label for="main-image-url">Main photo</label>
                        <div class="image-link-row">
                            <input type="url" id="main-image-url" placeholder="https://i.ibb.co/...">
                            <button type="button" class="image-add-btn" id="add-main-image-btn">+</button>
                        </div>
                    </div>

                    <div class="image-link-group">
                        <label for="other-image-url">Other Photos</label>
                        <div class="image-link-row">
                            <input type="url" id="other-image-url" placeholder="https://i.ibb.co/...">
                            <button type="button" class="image-add-btn" id="add-other-image-btn">+</button>
                        </div>
                    </div>
                </div>

                <div class="amenities-card">
                    <div id="amenities-list" class="amenities-list"></div>
                </div>
            </aside>
        </section>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
