<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review - HBnB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="logo.png" alt="HBnB Logo" class="logo">
        <a href="login.html" class="login-button" id="login-link">Login</a>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </nav>

    <main>
        <section class="add-review">
            <h1>Add a Review</h1>

            <form class="form" id="review-form">
                <label for="review-text">Your Review</label>
                <textarea id="review-text" name="review-text" rows="6" required></textarea>

                <label for="rating">Rating</label>
                <select id="rating" name="rating" required>
                    <option value="">Select rating</option>
                    <option value="1">1 - Poor</option>
                    <option value="2">2 - Fair</option>
                    <option value="3">3 - Good</option>
                    <option value="4">4 - Very Good</option>
                    <option value="5">5 - Excellent</option>
                </select>

                <p id="review-message"></p>

                <button type="submit">Submit Review</button>
            </form>
        </section>
    </main>

    <footer>
        <p>All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
